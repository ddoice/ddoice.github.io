

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src='https://unpkg.com/tesseract.js@v2.0.0-alpha.10/dist/tesseract.min.js'></script>
    <script crossorigin src="https://unpkg.com/react@16/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@16/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.21.1/babel.min.js"></script>
    <title>Test</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="icon" href="images/favicon.png" />
  </head>

  <body>
      <div id="root"></div>
      <hr/>
      <div id="err"></div>

      <script>
      
      window.addEventListener('error', function (err) {
        console.log('err', err)
        document.getElementById('err').innerHTML = JSON.stringify(err, ["message", "arguments", "type", "name"])
      })
            
      </script>

    <script type="text/babel">

let worker;
    
class PhotoCapture extends React.Component {
  constructor(props) {
    super(props);
    this.state = {
      status: '',
      text: ''
    }
  }
  componentDidMount() {

    setTimeout(()=>{
      throw new error('asd')
    }, 5000)

    console.log('componentDidMount')

    navigator.getUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.msGetUserMedia || navigator.oGetUserMedia || navigator.mozGetUserMedia;
    if (navigator.getUserMedia) {
        navigator.getUserMedia({  audio: false,
    video: {
        width: { ideal: 1280 },
        height: { ideal: 1024 },
        facingMode: "environment"
    }}, this.handleVideo, this.videoError)
    }

    worker = new Tesseract.TesseractWorker();

    worker
        .recognize(
          './images/ocr.png',
          'eng',
          // {
          //   'tessedit_ocr_engine_mode': OEM.TESSERACT_ONLY,
          //   'tessedit_char_whitelist': '0123456789-.',
          // }
        )
        .progress((p) => {
          const { status } = p;
          console.log('status', status)
          this.setState({ status });
        })
        .then((all) => {
          console.log('all.text', all.text)
          this.setState({ status: 'ready', enabled: true, text: all.text });          
        });



  }
  handleVideo (stream) {
    var canvas = document.getElementById('canvas');
    //var context = canvas.getContext('2d');
    var video = document.getElementById('video');
    video.srcObject = stream;
    video.play();
  }
  videoError() {
  }
  render(){
        // setTimeout(() => {
        //     if (!this.props.isOpen) {
        //         return;
        //     }
        //     const context = this.canvasElement.getContext('2d');
        //     context.drawImage(this.props.video, 0, 0, 640, 480);
        // });
        // const canvasEl = (<canvas id="canvas" width="640" height="480" className="photoCard" ref={(input) => this.canvasElement = canvas} />)
        const {text, status} = this.state;
        return (
          <div>
          <h1>video</h1>
          <p>{status}</p>
          <p>{text}</p>
            <div className="content">
                <video id="video" width="640" height="480" autoplay></video>
                <canvas id="canvas" width="640" height="480"></canvas>
            </div>
          </div>
            );
          
    }
}


      ReactDOM.render(
          <PhotoCapture />,
          document.getElementById('root')
      );


      </script>
      
  </body>
</html>

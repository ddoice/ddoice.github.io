<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test</title>
  <style>
    p {
      margin: 0;
      font-size: 0.8em;
    }
  </style>
</head>

<body>
  <div id="root">
    SW test
  </div>
  <hr />
  <div>
    <button onclick="register()">Register SW</button>
    <button onclick="unregister()">Un register SW</button>
    <button onclick="sendMessage()">CheckSW</button>
  </div>
  <div id="err"></div>
  <p>v4</p>

  <script>

    let worker;

    async function register() {
      alert('register sw')
      worker = await navigator.serviceWorker.register('sw.js');
      navigator.serviceWorker.addEventListener('message', function (event) {
        const logs = JSON.parse(event.data)
        document.querySelector('#err').innerHTML = logs.map(l => `<p>${JSON.stringify(l)}</p>`).join('\n');
      });



    }

    function sendMessage() {
      if(navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage("Client 1 says ");
      } else {
        document.querySelector('#err').innerHTML = `<h2>No service worker controller!</h2>`;

      }
    }

    function showNotification() {
      Notification.requestPermission(function(result) {
        if (result === 'granted') {
          navigator.serviceWorker.ready.then(function(registration) {
            registration.showNotification('Vibration Sample', {
              body: 'Sw registered!',
              icon: '../images/touch/chrome-touch-icon-192x192.png',
              vibrate: [200, 100, 200, 100, 200, 100, 200],
              tag: 'vibration-sample'
            });
          });
        } else {
          alert("Notifications are: " + result);
        }
      });
    }      

    showNotification();

    // showNotification();

    function unregister() {
      alert('unregister sw')
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (let registration of registrations) {
            registration.unregister()
          }
        }).catch(function (err) {
          console.log('Service Worker registration failed: ', err);
        });
      }
    }

    register()


  </script>

</body>

</html>
